services:
  # Secure-default: local lab surfaces stay on loopback.
  # Use `.env.demo.example` if you want reproducible demo credentials.

  # n8n: admin surface, owner credentials come from `.env`
  n8n:
    image: ${N8N_IMAGE:-n8nio/n8n:2.7.5}
    container_name: social-bot-n8n
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.50"
        reservations:
          memory: 512M
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:5678:5678"
    environment:
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678/}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_PROXY_HOPS=${N8N_PROXY_HOPS:-0}
      - N8N_METRICS=true
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-false}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_TEMPLATES_ENABLED=false
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-change-me-local-only-32-characters-min}
      - N8N_OWNER_EMAIL=${N8N_OWNER_EMAIL:-change-me@local.invalid}
      - N8N_OWNER_PASSWORD=${N8N_OWNER_PASSWORD:-ChangeMe-Local-Only!}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-America/Santiago}
      - INTEGRATION_API_KEY=${INTEGRATION_API_KEY:-change-me-integration-key}
    volumes:
      - ./n8n/data:/home/node/.n8n
      - ./scripts:/data/scripts:ro
      - ./n8n/workflows:/data/workflows:ro
    entrypoint: ["/bin/sh", "/data/scripts/n8n_auto_setup.sh"]
    networks:
      - bot-network

  # Dashboard maestro: local-only by default, keeps the browser-based lab usable
  master-dashboard:
    image: php:8.2-apache
    container_name: social-bot-master
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.10"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:8080:80"
    command: sh -c "a2enmod headers && apache2-foreground"
    volumes:
      - ./apache/security-headers.conf:/etc/apache2/conf-enabled/security-headers.conf:ro
      - ./index.html:/var/www/html/index.html:ro
      - ./resources.json:/var/www/html/resources.json:ro
    networks:
      - bot-network

  # Optional edge profile: reverse proxy with HTTPS and basic auth for remote admin access
  edge-proxy:
    image: ${EDGE_PROXY_IMAGE:-caddy:2.10.2-alpine}
    container_name: social-bot-edge-proxy
    profiles: ["edge"]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.10"
    ports:
      - "${EDGE_BIND_IP:-127.0.0.1}:80:80"
      - "${EDGE_BIND_IP:-127.0.0.1}:443:443"
      - "${EDGE_BIND_IP:-127.0.0.1}:443:443/udp"
    environment:
      - EDGE_N8N_HOST=${EDGE_N8N_HOST:-n8n.localhost}
      - EDGE_GRAFANA_HOST=${EDGE_GRAFANA_HOST:-grafana.localhost}
      - EDGE_CASE09_HOST=${EDGE_CASE09_HOST:-gateway.localhost}
      - EDGE_BASIC_AUTH_USER=${EDGE_BASIC_AUTH_USER:-labadmin}
      - EDGE_BASIC_AUTH_HASH=${EDGE_BASIC_AUTH_HASH:-}
    entrypoint: ["/bin/sh", "/edge/start-caddy.sh"]
    volumes:
      - ./edge:/edge:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - bot-network
    depends_on:
      - n8n

  # Case 01: destino PHP
  dest-php:
    image: php:8.2-apache
    container_name: social-bot-dest-php
    profiles: ["case01", "full"]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.10"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:8081:80"
    command: sh -c "a2enmod headers && apache2-foreground"
    volumes:
      - ./apache/security-headers.conf:/etc/apache2/conf-enabled/security-headers.conf:ro
      - ./cases/01-python-to-php/dest:/var/www/html
    networks:
      - bot-network
    environment:
      - DB_HOST=db-mysql
      - DB_NAME=social_bot
      - DB_USER=root
      - DB_PASS=${CASE01_DB_PASSWORD:-change-me-case01-local}
    depends_on:
      - db-mysql

  # Case 02: destino Go
  dest-go:
    build: ./cases/02-python-to-go/dest
    container_name: social-bot-dest-go
    profiles: ["case02", "full"]
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.05"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:8082:8080"
    networks:
      - bot-network
    environment:
      - DB_HOST=db-mariadb
      - DB_NAME=social_bot
      - DB_USER=root
      - DB_PASS=${CASE02_DB_PASSWORD:-change-me-case02-local}
    depends_on:
      - db-mariadb

  # Case 03: destino Node.js
  dest-node:
    build: ./cases/03-go-to-node/dest
    container_name: social-bot-dest-node
    profiles: ["case03", "full"]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.10"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:8083:3000"
    networks:
      - bot-network
    environment:
      - DB_HOST=db-postgres
      - DB_NAME=social_bot
      - DB_USER=postgres
      - DB_PASS=${CASE03_DB_PASSWORD:-change-me-case03-local}
    depends_on:
      - db-postgres

  # Case 04: destino FastAPI
  dest-fastapi:
    build: ./cases/04-node-to-fastapi/dest
    container_name: social-bot-dest-fastapi
    profiles: ["case04", "full"]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.10"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:8084:8000"
    networks:
      - bot-network

  # Case 05: destino React (Node)
  dest-react:
    image: node:20-alpine
    container_name: social-bot-dest-react
    profiles: ["case05", "full"]
    working_dir: /app
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.10"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:8085:4000"
    volumes:
      - ./cases/05-laravel-to-react/dest:/app
    command: sh -c "npm install express cors && node server.js"
    networks:
      - bot-network
    environment:
      - DB_HOST=db-mongodb
      - DB_NAME=social_bot
    depends_on:
      - db-mongodb

  # Case 06: destino Symfony (PHP)
  dest-symfony:
    image: php:8.2-apache
    container_name: social-bot-dest-symfony
    profiles: ["case06", "full"]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.10"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:8086:80"
    command: sh -c "a2enmod headers && apache2-foreground"
    volumes:
      - ./apache/security-headers.conf:/etc/apache2/conf-enabled/security-headers.conf:ro
      - ./cases/06-go-to-symfony/dest:/var/www/html
    networks:
      - bot-network
    environment:
      - DB_HOST=db-redis
    depends_on:
      - db-redis

  # Case 07: destino Ruby (Sinatra)
  dest-ruby:
    build: ./cases/07-rust-to-ruby/dest
    container_name: social-bot-dest-ruby
    profiles: ["case07", "full"]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.10"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:8087:4567"
    networks:
      - bot-network
    environment:
      - DB_HOST=db-cassandra
    depends_on:
      - db-cassandra

  # Case 08: destino Flask (Python)
  dest-flask:
    build: ./cases/08-csharp-to-flask/dest
    container_name: social-bot-dest-flask
    profiles: ["case08", "full"]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.10"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:8088:5000"
    networks:
      - bot-network
    environment:
      - DB_HOST=db-mssql
      - DB_PASS=${CASE08_DB_PASSWORD:-ChangeMe-Case08-Local!}
    depends_on:
      - db-mssql

  # Case 09: Integration Gateway (FastAPI + DuckDB)
  dest-gateway-09:
    build: ./cases/09-python-to-gateway/dest
    container_name: social-bot-dest-gateway-09
    profiles: ["case09", "full"]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.20"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:8089:8000"
    volumes:
      - ./cases/09-python-to-gateway/dest/data:/app/data
      - ./cases/09-python-to-gateway/dest/logs:/app/logs
    environment:
      - INTEGRATION_API_KEY=${INTEGRATION_API_KEY:-change-me-integration-key}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    networks:
      - bot-network

  # ---------------------------------------------------------------------------
  # Case 16: Apollo GraphQL -> n8n -> Hasura (GraphQL Engine) + TimescaleDB
  # Destino "motor real": el receiver traduce REST a GraphQL contra Hasura.
  # ---------------------------------------------------------------------------

  # TimescaleDB (Case 16): hypertable social_posts
  db-timescaledb-16:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: social-bot-db-timescaledb-16
    profiles: ["case16", "full"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.25"
    environment:
      - POSTGRES_DB=social_bot
      - POSTGRES_PASSWORD=${CASE16_DB_PASSWORD:-change-me-case16-local}
    volumes:
      - ./cases/16-graphql-to-hasura/dest/timescale/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - bot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d social_bot"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  # Hasura GraphQL Engine (Case 16): API GraphQL auto-derivada sobre TimescaleDB
  hasura-16:
    image: hasura/graphql-engine:v2.44.0
    container_name: social-bot-hasura-16
    profiles: ["case16", "full"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.25"
    environment:
      - HASURA_GRAPHQL_DATABASE_URL=postgres://postgres:${CASE16_DB_PASSWORD:-change-me-case16-local}@db-timescaledb-16:5432/social_bot
      - HASURA_GRAPHQL_ADMIN_SECRET=${CASE16_HASURA_SECRET:-change-me-case16-hasura}
      - HASURA_GRAPHQL_ENABLE_CONSOLE=false
      - HASURA_GRAPHQL_DEV_MODE=false
    networks:
      - bot-network
    depends_on:
      db-timescaledb-16:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  # Micro-receiver Case 16 (REST <-> GraphQL): superficie visible en :8091
  dest-graphql-16:
    build: ./cases/16-graphql-to-hasura/dest/receiver
    container_name: social-bot-dest-graphql-16
    profiles: ["case16", "full"]
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.10"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:8096:3000"
    environment:
      - PORT=3000
      - HASURA_URL=http://hasura-16:8080
      - HASURA_ADMIN_SECRET=${CASE16_HASURA_SECRET:-change-me-case16-hasura}
    networks:
      - bot-network
    depends_on:
      hasura-16:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Case 11: Elixir -> n8n -> Erlang (Cowboy) + Mnesia
  # Sin contenedor de BD: Mnesia vive dentro del runtime BEAM del receptor.
  # ---------------------------------------------------------------------------
  dest-erlang-11:
    build: ./cases/11-elixir-to-erlang/dest
    container_name: social-bot-dest-erlang-11
    profiles: ["case11", "full"]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.20"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:8091:8080"
    environment:
      - PORT=8080
    networks:
      - bot-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Case 17: Rust (MQTT) -> n8n -> Node (subscriber) -> InfluxDB
  # Mosquitto es el bus interno; InfluxDB el sink de series temporales.
  # ---------------------------------------------------------------------------

  # Broker MQTT (Case 17)
  mosquitto-17:
    image: eclipse-mosquitto:2.0
    container_name: social-bot-mosquitto-17
    profiles: ["case17", "full"]
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.10"
    volumes:
      - ./cases/17-mqtt-rust-to-node/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - bot-network
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t health -m ok || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # InfluxDB 1.8 (Case 17): persistencia de series temporales
  influxdb-17:
    image: influxdb:1.8
    container_name: social-bot-influxdb-17
    profiles: ["case17", "full"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.25"
    environment:
      - INFLUXDB_DB=social
      - INFLUXDB_HTTP_AUTH_ENABLED=false
    networks:
      - bot-network
    healthcheck:
      test: ["CMD-SHELL", "influx -execute 'SHOW DATABASES' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  # Subscriber MQTT + receiver REST (Case 17): superficie visible en :8093
  dest-mqtt-17:
    build: ./cases/17-mqtt-rust-to-node/dest
    container_name: social-bot-dest-mqtt-17
    profiles: ["case17", "full"]
    deploy:
      resources:
        limits:
          memory: 96M
          cpus: "0.10"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:8097:3000"
    environment:
      - PORT=3000
      - MQTT_URL=mqtt://mosquitto-17:1883
      - MQTT_TOPIC=social/posts
      - INFLUX_URL=http://influxdb-17:8086
      - INFLUX_DB=social
    networks:
      - bot-network
    depends_on:
      mosquitto-17:
        condition: service_healthy
      influxdb-17:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Case 10: Java (Spring Boot) -> n8n -> Kotlin (Ktor) + PostgreSQL
  # ---------------------------------------------------------------------------
  db-postgres-10:
    image: postgres:16-alpine
    container_name: social-bot-db-postgres-10
    profiles: ["case10", "full"]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    environment:
      - POSTGRES_DB=social_bot
      - POSTGRES_PASSWORD=${CASE10_DB_PASSWORD:-change-me-case10-local}
    networks:
      - bot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d social_bot"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  dest-ktor-10:
    build: ./cases/10-java-to-kotlin/dest
    container_name: social-bot-dest-ktor-10
    profiles: ["case10", "full"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.35"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:8090:8080"
    environment:
      - PORT=8080
      - DB_HOST=db-postgres-10
      - DB_NAME=social_bot
      - DB_USER=postgres
      - DB_PASS=${CASE10_DB_PASSWORD:-change-me-case10-local}
    networks:
      - bot-network
    depends_on:
      db-postgres-10:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Case 12: Python (LLM) -> n8n -> FastAPI RAG + pgvector
  # ---------------------------------------------------------------------------
  db-pgvector-12:
    image: pgvector/pgvector:pg16
    container_name: social-bot-db-pgvector-12
    profiles: ["case12", "full"]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    environment:
      - POSTGRES_DB=social_bot
      - POSTGRES_PASSWORD=${CASE12_DB_PASSWORD:-change-me-case12-local}
    networks:
      - bot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d social_bot"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  dest-rag-12:
    build: ./cases/12-python-to-rag/dest
    container_name: social-bot-dest-rag-12
    profiles: ["case12", "full"]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:8092:8000"
    environment:
      - DB_HOST=db-pgvector-12
      - DB_NAME=social_bot
      - DB_USER=postgres
      - DB_PASS=${CASE12_DB_PASSWORD:-change-me-case12-local}
    networks:
      - bot-network
    depends_on:
      db-pgvector-12:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Case 18: Zig -> n8n -> Crystal (Kemal) + Neo4j (grafo)
  # ---------------------------------------------------------------------------
  neo4j-18:
    image: neo4j:5.24-community
    container_name: social-bot-neo4j-18
    profiles: ["case18", "full"]
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.50"
        reservations:
          memory: 512M
    environment:
      - NEO4J_AUTH=neo4j/${CASE18_DB_PASSWORD:-change-me-case18-local}
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=256m
    networks:
      - bot-network
    # Chequeo TCP ligero del puerto HTTP (cypher-shell arranca una JVM y excede cualquier
    # timeout razonable). La readiness real (auth + queries) la reintenta el receptor Crystal.
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/7474' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  dest-crystal-18:
    build: ./cases/18-zig-to-crystal/dest
    container_name: social-bot-dest-crystal-18
    profiles: ["case18", "full"]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.15"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:8098:8080"
    environment:
      - PORT=8080
      - NEO4J_URL=http://neo4j-18:7474
      - NEO4J_USER=neo4j
      - NEO4J_PASS=${CASE18_DB_PASSWORD:-change-me-case18-local}
    networks:
      - bot-network
    depends_on:
      neo4j-18:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # Observability: optional profile, local-only by default
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.54.1}
    container_name: social-bot-prometheus
    profiles: ["observability", "full"]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:9090:9090"
    networks:
      - bot-network

  # Grafana: admin surface, only enabled through observability/full profiles
  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:11.2.0}
    container_name: social-bot-grafana
    profiles: ["observability", "full"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.25"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-ChangeMe-Grafana-Local!}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - bot-network
    depends_on:
      - prometheus

  # cAdvisor: host-mount observer, intentionally NOT started by default
  cadvisor:
    image: ${CADVISOR_IMAGE:-gcr.io/cadvisor/cadvisor:v0.49.1}
    container_name: social-bot-cadvisor
    profiles: ["observability", "full"]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.10"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:9091:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks:
      - bot-network

  # --- Databases for destinations ---

  # MySQL (Case 01)
  db-mysql:
    image: mysql:8.0-oracle
    container_name: social-bot-db-mysql
    profiles: ["case01", "full"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.25"
    environment:
      - MYSQL_ROOT_PASSWORD=${CASE01_DB_PASSWORD:-change-me-case01-local}
      - MYSQL_DATABASE=social_bot
    networks:
      - bot-network

  # MariaDB (Case 02)
  db-mariadb:
    image: mariadb:10.11
    container_name: social-bot-db-mariadb
    profiles: ["case02", "full"]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    environment:
      - MARIADB_ROOT_PASSWORD=${CASE02_DB_PASSWORD:-change-me-case02-local}
      - MARIADB_DATABASE=social_bot
    networks:
