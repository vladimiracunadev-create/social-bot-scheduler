# Security hardening — mounted into all php:8.2-apache services.
# Requires mod_headers; services enable it via:
#   command: sh -c "a2enmod headers && apache2-foreground"

# Disable directory listing globally
<Directory /var/www/html>
    Options -Indexes
</Directory>

<IfModule mod_headers.c>
    # Prevent clickjacking
    Header always set X-Frame-Options "SAMEORIGIN"

    # Prevent MIME-type sniffing
    Header always set X-Content-Type-Options "nosniff"

    # Limit referrer information sent to third parties
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Restrict resource origins; allow inline styles/scripts for the lab dashboard
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:"

    # Disable browser APIs not used by this lab
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()"
</IfModule>
