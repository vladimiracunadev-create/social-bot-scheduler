name: Wiki Sync

on:
  push:
    paths:
      - 'docs/wiki/**'
    branches:
      - main
  workflow_dispatch:

# Least-privilege por defecto; el job publish-wiki eleva a contents: write.
permissions:
  contents: read

jobs:
  publish-wiki:
    name: Sync to GitHub Wiki
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Sync Wiki Folder
        uses: Andrew-Chen-Wang/github-wiki-action@50650fccf3a10f741995523cf9708c53cec8912a # v4
        with:
          path: docs/wiki/
          ignore: "" # Sync all files in the folder
