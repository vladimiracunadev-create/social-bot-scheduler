name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Least-privilege por defecto: el token solo lee. Los jobs que necesitan más
# (build-and-push: packages:write) lo declaran explícitamente a nivel de job.
permissions:
  contents: read

jobs:
  supply-chain-checks:
    name: Supply Chain — Bidi & Obfuscation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Detect Unicode bidirectional control characters (CVE-2021-42574)
        run: |
          python - <<'PYEOF'
          import sys, pathlib, re

          # Trojan Source bidi characters (U+202A-U+202E, U+2066-U+2069, U+200F, U+061C)
          BIDI_PATTERN = re.compile(
              r'[\u202a-\u202e\u2066-\u2069\u200f\u061c]'
          )
          EXTENSIONS = {'.py', '.js', '.go', '.rb', '.rs', '.sh', '.php', '.ts', '.cs'}
          hits = []
          for path in pathlib.Path('.').rglob('*'):
              if path.suffix in EXTENSIONS and path.is_file():
                  try:
                      text = path.read_text(encoding='utf-8', errors='replace')
                      for lineno, line in enumerate(text.splitlines(), 1):
                          if BIDI_PATTERN.search(line):
                              hits.append(f'{path}:{lineno}: bidi character detected')
                  except OSError:
                      pass
          if hits:
              print('FAIL: Unicode bidi control characters found (CVE-2021-42574):')
              for h in hits:
                  print(' ', h)
              sys.exit(1)
          print('OK: No bidi characters found')
          PYEOF

      - name: Detect base64-encoded execution patterns
        run: |
          python - <<'PYEOF'
          import sys, pathlib, re

          # eval/exec/system called with a base64-decoded string — classic obfuscation
          OBFUS_PATTERN = re.compile(
              r'(eval|exec|system)\s*\([^)]*b64decode|base64\.b64decode[^)]*\)\s*\)',
              re.IGNORECASE,
          )
          EXTENSIONS = {'.py', '.js', '.rb', '.php', '.sh'}
          hits = []
          for path in pathlib.Path('.').rglob('*'):
              if path.suffix in EXTENSIONS and path.is_file():
                  try:
                      text = path.read_text(encoding='utf-8', errors='replace')
                      for lineno, line in enumerate(text.splitlines(), 1):
                          if OBFUS_PATTERN.search(line):
                              hits.append(f'{path}:{lineno}: potential base64 obfuscation')
                  except OSError:
                      pass
          if hits:
              print('FAIL: Potential code obfuscation patterns found:')
              for h in hits:
                  print(' ', h)
              sys.exit(1)
          print('OK: No obfuscation patterns found')
          PYEOF

  matrix-integrity:
    name: Matrix Integrity (01-08)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Validate 8-case matrix
        run: python scripts/validate_case_matrix.py

      - name: Validate port allocation (formula 8080+id, no collisions)
        run: python scripts/validate_ports.py

  runtime-security:
    name: Runtime Security Guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate runtime security guardrails
        run: python scripts/check_runtime_security.py

      - name: Validate compose rendering
        run: |
          if docker compose version >/dev/null 2>&1; then
            docker compose config >/dev/null
            docker compose --profile full config >/dev/null
            docker compose --profile observability config >/dev/null
            docker compose --profile edge config >/dev/null
            docker compose -f docker-compose.dev.yml config >/dev/null
          else
            docker-compose config >/dev/null
            docker-compose --profile full config >/dev/null
            docker-compose --profile observability config >/dev/null
            docker-compose --profile edge config >/dev/null
            docker-compose -f docker-compose.dev.yml config >/dev/null
          fi

  python-cases:
    name: Python Cases and Shared Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r cases/01-python-to-php/origin/requirements.txt
          pip install -r cases/02-python-to-go/origin/requirements.txt
          pip install black flake8 mypy pytest pytest-cov types-requests pip-audit

      - name: Python dependency audit
        run: pip-audit --ignore-vuln CVE-2026-1703

      - name: Format check
        run: black --check .

      - name: Type-check Python origin cases
        run: |
          mypy cases/01-python-to-php/origin/src/social_bot
          mypy cases/02-python-to-go/origin/src/social_bot

      - name: Test Python origin cases
        run: |
          pytest --cov=cases/01-python-to-php/origin/src/social_bot cases/01-python-to-php/origin/tests/
          pytest --cov=cases/02-python-to-go/origin/src/social_bot cases/02-python-to-go/origin/tests/

      - name: Compile Python destination cases
        run: |
          python -m py_compile check_resources.py hub.py scripts/validate_case_matrix.py scripts/check_runtime_security.py
          python -m py_compile cases/04-node-to-fastapi/dest/main.py
          python -m py_compile cases/08-csharp-to-flask/dest/app.py

      - name: Validate shared resilience scripts
        run: |
          chmod +x scripts/test_shared_scripts.sh
          ./scripts/test_shared_scripts.sh

  node-cases:
    name: Node Cases (03-05)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # Node 22: corepack activates pnpm v11 (matches the committed
          # pnpm-lock.yaml v9 format) which requires Node >= 22.13 (node:sqlite).
          node-version: '22'

      - name: Syntax check Node cases
        run: |
          node --check cases/03-go-to-node/dest/index.js
          node --check cases/04-node-to-fastapi/origin/index.js
          node --check cases/05-laravel-to-react/dest/server.js

      - name: Node vulnerability audit (pnpm audit) [P-04]
        run: |
          # Install pnpm 10 directly (avoids corepack pulling pnpm 11, which
          # needs Node >= 22.13); pnpm 10 reads the committed v9 lockfiles.
          npm install -g pnpm@10
          for dir in cases/03-go-to-node/dest \
                     cases/04-node-to-fastapi/origin \
                     cases/05-laravel-to-react/dest; do
            echo "== pnpm audit $dir =="
            ( cd "$dir" && pnpm audit --prod --audit-level high )
          done
        shell: bash

  php-cases:
    name: PHP Cases (01,05,06)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.2'

      - name: Lint PHP cases
        run: |
          php -l cases/01-python-to-php/dest/index.php
          php -l cases/01-python-to-php/dest/errors.php
          php -l cases/05-laravel-to-react/origin/ArtisanPost.php
          php -l cases/06-go-to-symfony/dest/index.php

  go-cases:
    name: Go Cases (02,03,06)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          # 'stable' = latest patched toolchain; keeps govulncheck [P-04] green
          # against stdlib advisories (e.g. GO-2026-5037/5039) fixed upstream.
          go-version: 'stable'

      - name: Parse Go cases
        run: |
          gofmt -e cases/02-python-to-go/dest/main.go > /dev/null
          gofmt -e cases/03-go-to-node/origin/main.go > /dev/null
          gofmt -e cases/06-go-to-symfony/origin/main.go > /dev/null
        shell: bash

      - name: Go vulnerability audit (govulncheck) [P-04]
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          export PATH="$(go env GOPATH)/bin:$PATH"
          for dir in cases/02-python-to-go/dest \
                     cases/03-go-to-node/origin \
                     cases/06-go-to-symfony/origin; do
            echo "== govulncheck $dir =="
            # `go mod tidy` (not `download`) writes the go.sum entries that
            # govulncheck needs to load packages; go.sum is not committed.
            ( cd "$dir" && go mod tidy && govulncheck ./... )
          done
        shell: bash

  ruby-case:
    name: Ruby Destination (07)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1
        with:
          ruby-version: '3.3'

      - name: Syntax check Ruby destination
        run: ruby -c cases/07-rust-to-ruby/dest/app.rb

      - name: Ruby vulnerability audit (bundler-audit) [P-04/P-06]
        run: |
          gem install bundler-audit
          ( cd cases/07-rust-to-ruby/dest && bundle-audit check --update )
        shell: bash

  rust-case:
    name: Rust Origin (07)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Check Rust origin
        run: cargo check --manifest-path cases/07-rust-to-ruby/origin/Cargo.toml

      - name: Rust vulnerability audit (cargo-audit) [P-04/P-05]
        # Blocking: the origin sample was modernized (dotenvy + reqwest 0.12),
        # clearing RUSTSEC-2021-0141 and RUSTSEC-2025-0134.
        run: |
          cargo install cargo-audit --locked
          cargo generate-lockfile --manifest-path cases/07-rust-to-ruby/origin/Cargo.toml
          cargo audit --file cases/07-rust-to-ruby/origin/Cargo.lock

  dotnet-case:
    name: Dotnet Origin (08)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '6.0.x'

      - name: Build .NET origin
        run: dotnet build cases/08-csharp-to-flask/origin/SocialBot.csproj --configuration Release

      - name: .NET vulnerability audit (dotnet list package --vulnerable) [P-04]
        run: |
          dotnet restore cases/08-csharp-to-flask/origin/SocialBot.csproj
          output=$(dotnet list cases/08-csharp-to-flask/origin/SocialBot.csproj \
            package --vulnerable --include-transitive 2>&1)
          echo "$output"
          if echo "$output" | grep -qi 'has the following vulnerable'; then
            echo "::error::Vulnerable .NET packages detected"
            exit 1
          fi
        shell: bash

  build-and-push:
    name: Build & Push to GHCR
    needs:
      - supply-chain-checks
      - matrix-integrity
      - runtime-security
      - python-cases
      - node-cases
      - php-cases
      - go-cases
      - ruby-case
      - rust-case
      - dotnet-case
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to the Container registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          load: true

      - name: Container Scan (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
