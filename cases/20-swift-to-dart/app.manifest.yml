id: "20"
name: "Swift -> n8n -> Dart (Shelf) + Firestore emulator"
path: "cases/20-swift-to-dart"
status: "ready"
origin:
  language: "swift"
  framework: "foundation"
  entrypoint: "origin/Sources/Publisher/main.swift"
destination:
  language: "dart"
  framework: "shelf"
  port: 8100
  url: "http://localhost:8100"
database:
  engine: "firestore"
  managed_by: "firebase-emulator-suite-local"
  features: ["firestore"]
stack: ["swift", "n8n", "dart", "shelf", "firebase", "firestore", "mobile-backend"]
description: "Stack mobile-backend server-side: emisor Swift (Linux) y receptor Dart/Shelf que persiste en el emulador de Firestore (Firebase Emulator Suite) via REST."
