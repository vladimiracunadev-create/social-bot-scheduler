id: "17"
name: "Rust (MQTT) -> n8n -> Node (sub) -> InfluxDB"
path: "cases/17-mqtt-rust-to-node"
status: "ready"
origin:
  language: "rust"
  protocol: "mqtt"
  library: "rumqttc"
  entrypoint: "origin/src/main.rs"
destination:
  language: "nodejs"
  protocol: "mqtt"
  port: 8097
  url: "http://localhost:8097"
broker:
  engine: "mosquitto"
  version: "2.x"
  qos: 1
database:
  engine: "influxdb"
  version: "1.8"
stack: ["rust", "mqtt", "mosquitto", "n8n", "nodejs", "influxdb", "iot", "telemetry"]
description: "Patron pub/sub IoT: emisor Rust publica en Mosquitto, un subscriber Node persiste en InfluxDB; el receiver REST reinyecta la entrega de n8n en el mismo bus MQTT."
